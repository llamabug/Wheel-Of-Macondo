<!DOCTYPE html>
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wheel of Macondo</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <div class="container">
        <div class="rbox">
            <h1>Wheel of Macondo</h1>
            <h2>✩°｡⋆🌺🥭🦜🌴🌺🍍🍹🍉🥥⋆｡°✩</h2>
            <p>Enter items (separate with a comma!):</p>
            <input type="text" id="items" placeholder="Phoebe, Rachel, Monica">
        </div>
        <div class="lbox">
            <canvas id="wheel" width="510" height="510">
            </canvas>
            <button id="spin">Spin the Wheel!</button>
        </div>

        <div id="winnerPopup" class="popup">
            <div class="popup-content">
                <h2 id="winnerText"></h2>
                <button id="closePopup">Close</button>
            </div>
        </div>

    </div>
    <script src="script.js"></script>

</body>
</html>
